name: Keep Supabase Alive

on:
  schedule:
    # Runs every 3 days at 08:00 UTC
    - cron: "0 8 */3 * *"
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  ping:
    name: Ping Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Ping Supabase REST API
        run: |
          echo "Pinging Supabase to prevent project hibernation..."

          RESPONSE=$(curl --silent --output /dev/null --write-out "%{http_code}" \
            --request GET \
            "${{ secrets.SUPABASE_URL }}/rest/v1/subscription_plans?select=id&limit=1" \
            --header "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            --header "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            --header "Accept: application/json")

          echo "HTTP status: $RESPONSE"

          if [ "$RESPONSE" -eq 200 ]; then
            echo "✅ Supabase is alive and responding."
          elif [ "$RESPONSE" -eq 000 ]; then
            echo "❌ Could not reach Supabase — network error."
            exit 1
          else
            echo "⚠️ Unexpected response: $RESPONSE — project may need attention."
            exit 1
          fi
